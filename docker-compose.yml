services:
  postgres:
    image: postgres:18
    container_name: postgres
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    shm_size: '256m'
    environment:
      - POSTGRES_USER=tracker
      - POSTGRES_PASSWORD=fdflkj234523jg
      - POSTGRES_DB=tracker
    volumes:
      - ./data:/var/lib/postgresql
      - ./db/scripts/:/opt/scripts:ro
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tracker -d tracker']
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "250m"
        max-file: "3"

  db-init:
    image: postgres:18
    container_name: db-init
    environment:
      PGPASSWORD: fdflkj234523jg
    volumes:
      - ./db/schema.sql:/schema.sql:ro
      - ./db/scripts:/opt/scripts:ro
    command: >
      sh -c "psql -h postgres -U tracker -d tracker -f /schema.sql &&
        psql -h postgres -U tracker -d tracker -f /opt/scripts/add-auth-sessions.sql &&
        psql -h postgres -U tracker -d tracker -f /opt/scripts/add-thb-and-crypto-currencies.sql"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    container_name: finance-tracker-app
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgres://tracker:fdflkj234523jg@postgres:5432/tracker
      - INITIAL_LOGIN=admin
      - INITIAL_PASSWORD=${INITIAL_PASSWORD:-changeme}
      - RESET_CREDENTIALS=${RESET_CREDENTIALS:-false}
      - SESSION_SECRET=${SESSION_SECRET:-change-this-secret-in-production}
      # Set SESSION_SECURE_COOKIE=false when serving over HTTP (e.g. http://host:3126)
      - SESSION_SECURE_COOKIE=${SESSION_SECURE_COOKIE:-}
    ports:
      - "3001:3001"
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: always

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    profiles:
      - tunnel
    depends_on:
      - app
    restart: always
